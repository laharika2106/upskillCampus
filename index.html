<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Mini App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

body.dark{
    background:#111827;
}

.container{
    width:430px;
    max-width:100%;
    background:#ffffff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

body.dark .container{
    background:#1f2937;
    color:white;
}

h2{
    margin-bottom:12px;
    font-size:22px;
    color:#222;
}

body.dark h2,
body.dark p{
    color:white;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

textarea{
    resize:none;
    height:90px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:8px;
}

button:hover{
    background:#5a67d8;
}

.dark-btn{
    background:#111827;
}

body.dark .dark-btn{
    background:#f59e0b;
    color:#111;
}

hr{
    margin:20px 0;
    border:none;
    border-top:1px solid #ddd;
}

#loginMsg{
    color:green;
    margin-top:10px;
    font-weight:bold;
}

.comment-box{
    background:#f1f5f9;
    color:#111;
    padding:12px;
    border-radius:10px;
    margin-top:12px;
    position:relative;
    padding-right:55px;
}

body.dark .comment-box{
    background:#374151;
    color:white;
}

.comment-time{
    font-size:12px;
    color:#666;
    margin-top:5px;
}

body.dark .comment-time{
    color:#d1d5db;
}

.delete-btn{
    position:absolute;
    top:10px;
    right:10px;
    width:auto;
    padding:5px 8px;
    font-size:12px;
    background:#ef4444;
}

.delete-btn:hover{
    background:#dc2626;
}

.like-section{
    text-align:center;
}

#likeCount{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    color:#222;
}
</style>
</head>

<body>

<div class="container">

<button class="dark-btn" onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>

<hr>

<h2>Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg"></p>

<hr>

<h2>Add Comment</h2>
<textarea id="comment" placeholder="Write your comment..."></textarea>
<button onclick="addComment()">Post Comment</button>

<div id="comments"></div>

<hr>

<div class="like-section">
<h2>Like Post</h2>
<button onclick="likePost()">👍 Like</button>
<p id="likeCount">0 Likes</p>
</div>

</div>

<script>
let likeCount = localStorage.getItem("likes") || 0;
document.getElementById("likeCount").innerText = likeCount + " Likes";

window.onload = function(){
    loadComments();

    if(localStorage.getItem("darkMode") === "enabled"){
        document.body.classList.add("dark");
    }
};

function login(){
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(user === "" || pass === ""){
        alert("Please fill all fields");
    }
    else if(user === "admin" && pass === "1234"){
        document.getElementById("loginMsg").innerText = "Login Successful!";
    }
    else{
        alert("Invalid Username or Password");
    }
}

function addComment(){
    let commentText = document.getElementById("comment").value.trim();

    if(commentText === ""){
        alert("Please enter a comment");
        return;
    }

    let time = new Date().toLocaleString();

    let comments = JSON.parse(localStorage.getItem("comments")) || [];

    comments.push({
        text: commentText,
        time: time
    });

    localStorage.setItem("comments", JSON.stringify(comments));

    document.getElementById("comment").value = "";
    loadComments();
}

function loadComments(){
    let comments = JSON.parse(localStorage.getItem("comments")) || [];
    let commentsDiv = document.getElementById("comments");

    commentsDiv.innerHTML = "";

    comments.forEach((comment,index)=>{
        let box = document.createElement("div");
        box.className = "comment-box";

        let para = document.createElement("p");
        para.innerText = comment.text;

        let time = document.createElement("p");
        time.className = "comment-time";
        time.innerText = "Posted on: " + comment.time;

        let btn = document.createElement("button");
        btn.className = "delete-btn";
        btn.innerText = "X";
        btn.onclick = function(){
            deleteComment(index);
        };

        box.appendChild(para);
        box.appendChild(time);
        box.appendChild(btn);

        commentsDiv.appendChild(box);
    });
}

function deleteComment(index){
    let comments = JSON.parse(localStorage.getItem("comments")) || [];

    comments.splice(index,1);

    localStorage.setItem("comments", JSON.stringify(comments));

    loadComments();
}

function likePost(){
    likeCount++;
    localStorage.setItem("likes", likeCount);
    document.getElementById("likeCount").innerText = likeCount + " Likes";
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("darkMode","enabled");
    }
    else{
        localStorage.setItem("darkMode","disabled");
    }
}
</script>

</body>
</html>
